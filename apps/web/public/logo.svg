<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="CHECK SQUARE — Property Inspection">
  <!-- Background -->
  <rect width="400" height="240" rx="14" fill="#2BA4B4"/>

  <!-- House roof outline -->
  <path d="M55 130 L200 35 L345 130" fill="none" stroke="#1F3F8E" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- House body (brick wall) clipped under roof -->
  <g>
    <rect x="80" y="120" width="240" height="100" fill="#5b6470"/>
    <!-- Brick lines -->
    <g stroke="#3a4046" stroke-width="2.5">
      <line x1="80"  y1="138" x2="320" y2="138"/>
      <line x1="80"  y1="158" x2="320" y2="158"/>
      <line x1="80"  y1="178" x2="320" y2="178"/>
      <line x1="80"  y1="198" x2="320" y2="198"/>
      <!-- Vertical staggered joints -->
      <line x1="120" y1="120" x2="120" y2="138"/>
      <line x1="180" y1="120" x2="180" y2="138"/>
      <line x1="240" y1="120" x2="240" y2="138"/>
      <line x1="280" y1="120" x2="280" y2="138"/>
      <line x1="100" y1="138" x2="100" y2="158"/>
      <line x1="160" y1="138" x2="160" y2="158"/>
      <line x1="220" y1="138" x2="220" y2="158"/>
      <line x1="300" y1="138" x2="300" y2="158"/>
      <line x1="120" y1="158" x2="120" y2="178"/>
      <line x1="200" y1="158" x2="200" y2="178"/>
      <line x1="260" y1="158" x2="260" y2="178"/>
      <line x1="100" y1="178" x2="100" y2="198"/>
      <line x1="180" y1="178" x2="180" y2="198"/>
      <line x1="260" y1="178" x2="260" y2="198"/>
      <line x1="120" y1="198" x2="120" y2="220"/>
      <line x1="200" y1="198" x2="200" y2="220"/>
      <line x1="280" y1="198" x2="280" y2="220"/>
    </g>

    <!-- Arched window -->
    <path d="M155 90 Q200 55 245 90 L245 130 L155 130 Z" fill="#111827" stroke="#1F3F8E" stroke-width="5"/>
    <line x1="200" y1="60"  x2="200" y2="130" stroke="#cbd5e1" stroke-width="2"/>
    <line x1="160" y1="100" x2="240" y2="100" stroke="#cbd5e1" stroke-width="2"/>

    <!-- Lightning-bolt style diagonal CRACK across wall -->
    <polyline points="110,128 138,154 124,170 152,196 138,218"
              fill="none" stroke="#111827" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square"/>
    <polyline points="110,128 138,154 124,170 152,196 138,218"
              fill="none" stroke="#e5e7eb" stroke-width="2" stroke-linejoin="miter" stroke-linecap="square" opacity="0.6"/>
  </g>

  <!-- Magnifying glass over wall (right side) -->
  <g>
    <!-- handle -->
    <rect x="320" y="180" width="46" height="14" rx="4" fill="#1F3F8E" transform="rotate(40 320 180)"/>
    <!-- outer rim -->
    <circle cx="280" cy="155" r="56" fill="#ffffff" stroke="#9aa3ad" stroke-width="6"/>
    <circle cx="280" cy="155" r="50" fill="#e8f4f6" stroke="#1F3F8E" stroke-width="3"/>

    <!-- pipe with drip inside lens -->
    <g>
      <!-- pipe body -->
      <rect x="240" y="148" width="80" height="16" rx="2" fill="#9aa3ad" stroke="#3a4046" stroke-width="2"/>
      <!-- flange -->
      <rect x="304" y="142" width="14" height="28" rx="2" fill="#cbd5e1" stroke="#3a4046" stroke-width="2"/>
      <!-- water drop -->
      <path d="M276 168 Q272 182 280 188 Q288 182 284 168 Z" fill="#2BA4B4" stroke="#1F3F8E" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Tagline (optional, small) -->
  <text x="200" y="232" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="9" letter-spacing="3" fill="#ffffff" opacity="0.85">CHECK · SQUARE · INSPECTION</text>
</svg>
