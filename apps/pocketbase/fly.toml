# Fly.io app config for PocketBase backend.
# Replace `app` with whatever name `fly launch` assigns/you choose.
# Free tier guidance: 3 shared-cpu-1x VMs (256 MB) + 3 GB total volume storage.

app = "checksquare-pb"
primary_region = "bom"            # change to your nearest region (e.g. "sin", "fra", "iad")

[build]
  dockerfile = "Dockerfile"

# Persistent volume for /pb_data (SQLite DB + every uploaded photo).
# Create it once with:  fly volumes create pb_data --region bom --size 1
[[mounts]]
  source      = "pb_data"
  destination = "/pb_data"

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines = "off"     # keep PB always-on (free tier still covers this)
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus   = 1
